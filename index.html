<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>FJAD审图</title>
  <style>
    /* 全局重置，确保移动端无白边 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background-color: #2c2f33;
      overflow: hidden;
    }
    #app {
      height: 100vh;
      width: 100vw;
      max-width: 500px;   /* 固定最大宽度，居中显示 */
      margin: 0 auto;
      background: #2c2f33;
      position: relative;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
